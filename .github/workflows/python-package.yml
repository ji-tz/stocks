name: Python package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install pip conf
      run: |
        mkdir -p ~/.pip
        cp pip.conf ~/.pip/pip.conf || true
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium
    
    - name: Static Code Analysis - Pylint
      run: |
        echo "=== Running Pylint ==="
        pylint --rcfile=.pylintrc stocks.py main.py gui/ simulator/ solver/ tests/ || true
      continue-on-error: true
    
    - name: Static Code Analysis - Flake8
      run: |
        echo "=== Running Flake8 ==="
        flake8 . || true
      continue-on-error: true
    
    - name: Static Code Analysis - Mypy
      run: |
        echo "=== Running Mypy Type Checking ==="
        mypy stocks.py main.py --config-file=mypy.ini || true
      continue-on-error: true
    
    - name: Run all tests
      run: |
        python -m unittest discover tests -v
    
    - name: Run strategy simulator tests specifically
      run: |
        echo "=== Testing Trading Strategy Simulators ==="
        python -m unittest tests.test_simulator -v
    
    - name: Verify simulator functionality
      run: |
        echo "=== Verifying Mean Cost Strategy ==="
        python -c "from simulator.simulator import Simulator; from solver.mean_cost_strategy import MeanCostDecision; print('✓ Mean Cost Strategy loaded successfully')"
        echo "=== Verifying SMA Strategy ==="
        python -c "from simulator.simulator import Simulator, simulate_sma; from solver.sma_strategy import SmaDecision; print('✓ SMA Strategy loaded successfully')"
    
    - name: Take Main GUI Screenshot
      run: |
        echo "=== Taking Main GUI Screenshot ==="
        python screenshot_main.py screenshots/main_gui.png
      continue-on-error: true
    
    - name: Run Yangtze Power Integration Test (2020-2022)
      run: |
        echo "=== Running Yangtze Power (600900) Integration Test ==="
        python test_yangtze_power.py
      continue-on-error: true
    
    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
        retention-days: 30
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test_results/
        retention-days: 30
    
    - name: Comment PR with Screenshots
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // 读取测试结果
          let testResult = '';
          try {
            const resultPath = 'test_results/yangtze_power_test.json';
            if (fs.existsSync(resultPath)) {
              const data = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
              testResult = `
          ## 长江电力（600900）2020-2022定投测试结果
          
          - **股票代码**: ${data.symbol || '600900'}
          - **测试期间**: ${data.start_date || '2020-01-01'} ~ ${data.end_date || '2022-12-31'}
          - **初始资金**: ¥${(data.init_cash || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **最终资金**: ¥${(data.final_cash || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **总收益**: ¥${(data.total_profit || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **收益率**: ${((data.return_rate || 0) * 100).toFixed(2)}%
          - **交易次数**: ${data.total_trades || 0}
          - **持有股数**: ${data.final_shares || 0}
          `;
            }
          } catch (e) {
            console.log('Failed to read test results:', e);
          }
          
          const comment = `
          ## 🤖 自动化测试报告
          
          ### 📊 主界面截图
          
          主界面已成功运行并截图。请查看 Artifacts 中的 \`screenshots/main_gui.png\`
          
          ${testResult}
          
          ### 📁 完整报告
          
          请下载以下 Artifacts 查看详细结果:
          - **screenshots**: 包含主界面和测试结果图表
          - **test-results**: 包含测试结果JSON数据
          
          ---
          *Generated by GitHub Actions*
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
