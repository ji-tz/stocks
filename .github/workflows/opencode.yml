name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate OPENCODE_API_KEY is set
        run: |
          if [ -z "$OPENCODE_API_KEY" ]; then
            echo "ERROR: OPENCODE_API_KEY secret is not set in repository settings."
            echo "Please add the OPENCODE_API_KEY secret to your repository settings."
            echo "Go to: Repository Settings > Secrets and variables > Actions > New repository secret"
            echo "Name: OPENCODE_API_KEY"
            echo "Value: Your OpenCode API key from https://opencode.ai/auth"
            exit 1
          fi
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/big-pickle
      


