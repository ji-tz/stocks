name: claude-code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      contains(github.event.comment.body, ' /cc') ||
      startsWith(github.event.comment.body, '/cc') ||
      contains(github.event.comment.body, ' /claude') ||
      startsWith(github.event.comment.body, '/claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
          trigger_phrase: "/cc"
