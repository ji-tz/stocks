name: Check Secret
on: [push]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify DEEPSEEK_API_KEY
        env:
          DS_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -n "$DS_KEY" ]; then
            echo "✅ Secret DEEPSEEK_API_KEY is CONFIGURED"
          else
            echo "❌ Secret DEEPSEEK_API_KEY is NOT SET"
            exit 1
          fi
