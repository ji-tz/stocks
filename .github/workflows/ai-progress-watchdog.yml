name: AI Progress Watchdog

# Scheduled workflow that monitors issues in ai-in-progress state.
# Enhanced with routing failure detection and batch alerting.
#
# Detection tiers:
# [NEW] Tier 0 — Routing failure (>2h ai-in-progress WITHOUT triaged label)
# [NEW] Tier 1 — Queue stuck   (>4h triaged but no PR / no kanban task)
# Tier 2 — Stale warning (>=22h ai-in-progress without PR)
# Tier 3 — Auto-close   (>=24h30m ai-in-progress without PR)
# [NEW] Batch alert     (3+ simultaneous routing failures → summary issue)
#
# References: #243, #245, #248, #250

on:
  schedule:
    # Every 30 minutes to catch tier thresholds promptly
    - cron: '*/30 * * * *'
  # Manual trigger for debugging
  workflow_dispatch:

permissions:
  issues: write
  contents: write
  pull-requests: read

concurrency:
  group: ai-progress-watchdog
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/github-script@v9
        id: watchdog
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          script: |
            const NOW = Date.now();
            const DAY_MS = 24 * 3600 * 1000;
            const HOUR_MS = 3600 * 1000;

            // Detection thresholds
            const ROUTING_FAILURE_THRESHOLD = 2 * HOUR_MS;       // >2h without triaged → triage script failed
            const QUEUE_STUCK_THRESHOLD = 4 * HOUR_MS;           // >4h triaged but no PR → kanban router failed
            const WARN_THRESHOLD = 22 * HOUR_MS;                 // >=22h → post warning
            const CLOSE_THRESHOLD = 24 * HOUR_MS + 30 * 60 * 1000; // >=24h30m → auto-close (buffer for schedule)
            const BATCH_ALERT_COUNT = 3;                         // >=3 routing failures → batch alert

            const repo = context.repo;
            const results = [];
            const routingFailures = [];
            const queueStuck = [];

            // ============================================================
            // Helper: check if a Kanban task exists for this issue
            // ============================================================
            async function checkKanbanTaskExists(issueNum) {
              // Look for a bot comment indicating kanban task creation
              // The implementation router posts "CREATED #<num>" in its output;
              // we check issue comments for kanban/router bot comments
              try {
                const { data: comments } = await github.rest.issues.listComments({
                  ...repo,
                  issue_number: issueNum,
                  per_page: 50,
                  sort: 'created',
                  direction: 'desc',
                });
                // Check for the implementation-router's standard comment template:
                // The router adds a comment with "Implementation for Issue #<num>"
                // when it successfully creates a kanban task
                return comments.some(c =>
                  c.body &&
                  c.body.includes(`Implementation for Issue #${issueNum}`) &&
                  c.user && c.user.type === 'Bot'
                );
              } catch (e) {
                core.warning(`Could not check kanban comments for #${issueNum}: ${e.message}`);
                return false;
              }
            }

            // ============================================================
            // Helper: post a routing failure alert comment on an issue
            // ============================================================
            async function postRoutingFailureAlert(issueNum, failureType, ageHours, totalAgeHours) {
              const alertLabel = failureType === 'routing' ? '🔴 路由失败' : '🟠 队列阻塞';
              const description = failureType === 'routing'
                ? '此 Issue 已进入 **ai-in-progress** 超过 **2 小时**但从未被 ARCH 拆解（无 `triaged` 标签）。这意味着路由工作流或 ARCH 拆解脚本可能未正常运行。'
                : '此 Issue 已被 ARCH 拆解（有 `triaged` 标签）但超过 **4 小时**没有任何关联 PR。这意味着实现路由脚本可能未能成功创建 Kanban 任务，或 Agent 分配管道存在故障。';

              const comment = [
                `## ${alertLabel} — 自动路由管道异常`,
                ``,
                description,
                ``,
                `**状态：**`,
                `- 🕒 最后更新：${new Date(issueNum)}`,
                `- ⏳ 当前超时：${ageHours} 小时`,
                `- 📊 Issue 总存活时间：${totalAgeHours} 小时`,
                `- 🔍 关联 PR：未找到`,
                `- 🏷️ 故障类型：${failureType === 'routing' ? 'ARCH 拆解未执行' : 'Kanban 任务未创建'}`,
                ``,
                `> ⚠️ 请检查路由脚本 (stocks-issue-router.py / stocks-implementation-router.py) 运行状态。`,
              ].join('\n');

              await github.rest.issues.createComment({
                ...repo,
                issue_number: issueNum,
                body: comment,
              });
            }

            // ============================================================
            // Fetch all open issues with ai-in-progress label
            // ============================================================
            let page = 1;
            let allIssues = [];
            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                ...repo,
                state: 'open',
                labels: 'ai-in-progress',
                per_page: 100,
                page: page,
              });
              allIssues = allIssues.concat(issues);
              if (issues.length < 100) break;
              page++;
            }

            // Filter out PRs (GitHub API returns both)
            const issues = allIssues.filter(i => !i.pull_request);
            core.info(`Found ${issues.length} open issues with ai-in-progress`);

            for (const issue of issues) {
              const num = issue.number;
              const title = issue.title;
              const lastUpdated = new Date(issue.updated_at + 'Z').getTime();
              const ageMs = NOW - lastUpdated;
              const ageHours = (ageMs / HOUR_MS).toFixed(1);
              const createdAt = new Date(issue.created_at + 'Z').getTime();
              const totalAgeHours = ((NOW - createdAt) / HOUR_MS).toFixed(1);
              const issueLabels = (issue.labels || []).map(l => l.name);
              const hasTriaged = issueLabels.includes('triaged');
              const hasPR = issueLabels.includes('has-pr') || issueLabels.includes('needs-review') || issueLabels.includes('needs-qa') || issueLabels.includes('ai-done');
              const isClosed = issue.state === 'closed';

              // Check for actual PR
              let actualPRUrl = null;
              let hasActualPR = false;
              try {
                const { data: prs } = await github.rest.pulls.list({
                  ...repo,
                  state: 'all',
                  head: `feat/issue-${num}`,
                  per_page: 5,
                });
                if (prs.length > 0) {
                  hasActualPR = true;
                  actualPRUrl = prs[0].html_url;
                }
              } catch (e) {
                core.warning(`Could not check PR for #${num}: ${e.message}`);
              }

              core.info(`#${num}: age=${ageHours}h triaged=${hasTriaged} hasPR=${hasActualPR}`);

              // ============================================================
              // [NEW] Tier 0 — Routing failure: ai-in-progress but NO triaged label
              // This means the triage router (stocks-issue-router.py) never ran.
              // ============================================================
              if (ageMs > ROUTING_FAILURE_THRESHOLD && !hasTriaged && !hasActualPR && !isClosed) {
                // Check if we already posted a routing failure alert
                const { data: comments } = await github.rest.issues.listComments({
                  ...repo,
                  issue_number: num,
                  per_page: 10,
                  sort: 'created',
                  direction: 'desc',
                });

                const alreadyAlerted = comments.some(c =>
                  c.body && (c.body.includes('🔴 路由失败') || c.body.includes('🟠 队列阻塞')) &&
                  c.user && c.user.type === 'Bot'
                );

                if (!alreadyAlerted) {
                  await postRoutingFailureAlert(num, 'routing', ageHours, totalAgeHours);
                  results.push(`🔴 ROUTING_FAILURE #${num} — ai-in-progress ${ageHours}h WITHOUT triaged label (${title.slice(0,50)})`);
                  core.info(`Posted routing failure alert on #${num} — ${ageHours}h without triaged`);
                } else {
                  results.push(`🔴 ROUTING_FAILURE #${num} — already alerted, ${ageHours}h (${title.slice(0,50)})`);
                }
                routingFailures.push(num);
                continue;
              }

              // ============================================================
              // [NEW] Tier 1 — Queue stuck: triaged but NO PR after queue threshold
              // Only applies when below warning threshold (warning has priority).
              // This means the implementation router (stocks-implementation-router.py)
              // may have failed to create a kanban task.
              // ============================================================
              if (ageMs > QUEUE_STUCK_THRESHOLD && ageMs <= WARN_THRESHOLD && hasTriaged && !hasActualPR && !isClosed) {
                // Check if kanban task exists by looking for router's comment
                const hasKanbanTask = await checkKanbanTaskExists(num);

                const { data: comments } = await github.rest.issues.listComments({
                  ...repo,
                  issue_number: num,
                  per_page: 10,
                  sort: 'created',
                  direction: 'desc',
                });

                const alreadyAlerted = comments.some(c =>
                  c.body && (c.body.includes('🟠 队列阻塞') || c.body.includes('🔴 路由失败')) &&
                  c.user && c.user.type === 'Bot'
                );

                if (!alreadyAlerted) {
                  const stuckType = hasKanbanTask ? 'kanban-exists-but-no-progress' : 'no-kanban-task';
                  await postRoutingFailureAlert(num, 'queue', ageHours, totalAgeHours);

                  results.push(`🟠 QUEUE_STUCK #${num} — ${ageHours}h triaged no PR, kanban=${hasKanbanTask} (${title.slice(0,50)})`);
                  core.info(`Posted queue stuck alert on #${num} — ${ageHours}h triaged, kanban=${hasKanbanTask}`);
                } else {
                  results.push(`🟠 QUEUE_STUCK #${num} — already alerted, ${ageHours}h (${title.slice(0,50)})`);
                }
                queueStuck.push(num);
                continue;
              }

              // ============================================================
              // [EXISTING] Tier 2 — >22h without PR → post warning
              // ============================================================
              if (ageMs > WARN_THRESHOLD && hasTriaged && !hasActualPR && !isClosed) {
                // Check if we already posted a warning
                const { data: comments } = await github.rest.issues.listComments({
                  ...repo,
                  issue_number: num,
                  per_page: 5,
                  sort: 'created',
                  direction: 'desc',
                });

                const alreadyWarned = comments.some(c =>
                  c.body && c.body.includes('⏰ 超时警告') && c.user && c.user.type === 'Bot'
                );

                if (!alreadyWarned) {
                  const warnComment = [
                    `## ⏰ 超时警告 — ai-in-progress 超 ${ageHours}h`,
                    ``,
                    `此 Issue 已进入 **ai-in-progress** 状态 **${ageHours} 小时**，但尚未检测到关联 PR。`,
                    ``,
                    `**状态：**`,
                    `- 🕒 最后更新：${new Date(lastUpdated).toISOString()}`,
                    `- ⏳ 当前超时：${ageHours} / 24h`,
                    `- 🔍 关联 PR：未找到`,
                    ``,
                    `> ⚠️ 如果 **24 小时**内仍无 PR，此 Issue 将被自动关闭。`,
                  ].join('\n');

                  await github.rest.issues.createComment({
                    ...repo,
                    issue_number: num,
                    body: warnComment,
                  });

                  results.push(`🟠 #${num} WARNING — ai-in-progress ${ageHours}h without PR (${title.slice(0,50)})`);
                  core.info(`Posted warning on #${num} — stale ${ageHours}h`);
                } else {
                  core.info(`Already warned on #${num}, skipping`);
                  results.push(`🟡 #${num} Still stale ${ageHours}h — warning already posted`);
                }
                continue;
              }

              // ============================================================
              // [EXISTING] Tier 3 — >24h without PR → auto-close
              // ============================================================
              if (ageMs > CLOSE_THRESHOLD && hasTriaged && !hasActualPR && !isClosed) {
                const closeComment = [
                  `## ⏰ 自动关闭 — ai-in-progress 超时`,
                  ``,
                  `此 Issue 在 **ai-in-progress** 状态停留超过 **24 小时**（实际 ${ageHours}h），且未检测到关联 PR，已自动关闭。`,
                  ``,
                  `**统计：**`,
                  `- 🕒 最后更新：${new Date(lastUpdated).toISOString()}`,
                  `- ⏳ 超时时间：${ageHours} 小时`,
                  `- 📊 Issue 总存活时间（从创建起）：${totalAgeHours} 小时`,
                  `- 🔍 关联 PR：未找到`,
                  ``,
                  `> 如需重新打开，请先确认问题已解决或重新路由。`,
                ].join('\n');

                await github.rest.issues.createComment({
                  ...repo,
                  issue_number: num,
                  body: closeComment,
                });

                await github.rest.issues.update({
                  ...repo,
                  issue_number: num,
                  state: 'closed',
                  state_reason: 'not_planned',
                });

                results.push(`🔴 #${num} CLOSED — ai-in-progress ${ageHours}h without PR (${title.slice(0,50)})`);
                core.info(`Closed #${num} — stale ${ageHours}h`);

                // Try to delete the associated branch
                const branchName = `feat/issue-${num}`;
                try {
                  const { data: ref } = await github.rest.git.getRef({
                    ...repo,
                    ref: `heads/${branchName}`,
                  });
                  if (ref) {
                    await github.rest.git.deleteRef({
                      ...repo,
                      ref: `heads/${branchName}`,
                    });
                    results.push(`  🗑️ Deleted branch ${branchName}`);
                    core.info(`Deleted branch ${branchName} for closed #${num}`);
                  }
                } catch (e) {
                  core.info(`No branch ${branchName} to delete for #${num}`);
                }
                continue;
              }

              // ============================================================
              // Healthy: in-progress and within thresholds
              // ============================================================
              if (hasActualPR) {
                results.push(`✅ #${num} OK — has PR ${actualPRUrl} (${ageHours}h in progress)`);
              } else if (hasTriaged) {
                results.push(`✅ #${num} OK — triaged, ${ageHours}h (under ${QUEUE_STUCK_THRESHOLD / HOUR_MS}h queue threshold)`);
              } else {
                results.push(`✅ #${num} OK — awaiting triage, ${ageHours}h (under ${ROUTING_FAILURE_THRESHOLD / HOUR_MS}h routing threshold)`);
              }
            }

            // ============================================================
            // [NEW] Batch alert: 3+ routing failures → create summary issue
            // ============================================================
            const totalStuck = routingFailures.length + queueStuck.length;
            if (totalStuck >= BATCH_ALERT_COUNT) {
              const summaryTitle = `⚠️ [自动警报] 批量路由管道故障 — ${totalStuck} 个 Issue 卡在 ai-in-progress`;

              // Check if a batch alert issue already exists (look for open issue with matching title prefix)
              let batchAlertExists = false;
              let existingBatchIssueNum = null;
              let page2 = 1;
              while (true) {
                const { data: openIssues } = await github.rest.issues.listForRepo({
                  ...repo,
                  state: 'open',
                  per_page: 100,
                  page: page2,
                });
                const match = openIssues.find(i =>
                  !i.pull_request &&
                  i.title && i.title.startsWith('⚠️ [自动警报] 批量路由管道故障')
                );
                if (match) {
                  batchAlertExists = true;
                  existingBatchIssueNum = match.number;
                  break;
                }
                if (openIssues.length < 100) break;
                page2++;
              }

              if (!batchAlertExists) {
                const sections = [];
                if (routingFailures.length > 0) {
                  sections.push(
                    '### 🔴 路由失败（未拆解）\n' +
                    routingFailures.map(n => `- [#${n}](https://github.com/${repo.owner}/${repo.repo}/issues/${n})`).join('\n') +
                    '\n_原因：`ai-in-progress` 但无 `triaged` 标签 — ARCH 拆解工作流/脚本未执行_\n'
                  );
                }
                if (queueStuck.length > 0) {
                  sections.push(
                    '### 🟠 队列阻塞（拆解后未分配）\n' +
                    queueStuck.map(n => `- [#${n}](https://github.com/${repo.owner}/${repo.repo}/issues/${n})`).join('\n') +
                    '\n_原因：已有 `triaged` 标签但无关联 PR — 实现路由脚本可能未创建 Kanban 任务_\n'
                  );
                }

                const batchBody = [
                  `## ⚠️ 自动检测到批量路由管道故障`,
                  ``,
                  `看门狗在 **${new Date().toISOString()}** 检测到 **${totalStuck}** 个 Issue 卡在路由管道中。`,
                  ``,
                  ...sections,
                  `---`,
                  `### 🔧 建议排查项目`,
                  ``,
                  `1. **检查 stocks-issue-router.py 运行日志** — 确认 Cron 30 分钟调度是否正常`,
                  `2. **检查 stocks-implementation-router.py 运行日志** — 确认 Kanban 任务创建是否成功`,
                  `3. **检查 Kanban 调度器状态** — 确认 profiles/stocks 的 gateway 连接正常`,
                  `4. **检查 GitHub Actions 日志** — 确认 issue-auto-routing.yml 正常运行`,
                  ``,
                  `> _由 ai-progress-watchdog 自动创建 — 需要人工介入_`,
                ].join('\n');

                const { data: createdAlert } = await github.rest.issues.create({
                  ...repo,
                  title: summaryTitle,
                  body: batchBody,
                  labels: ['bug', 'P0'],
                });

                results.push(`🚨 BATCH_ALERT — Created issue #${createdAlert.number}: "${summaryTitle}"`);
                core.info(`Created batch alert issue #${createdAlert.number} with ${totalStuck} stuck items`);
              } else {
                // Update existing alert with new details
                results.push(`🚨 BATCH_ALERT — Existing alert #${existingBatchIssueNum} still active (${totalStuck} stuck items)`);
                core.info(`Batch alert issue #${existingBatchIssueNum} already exists, ${totalStuck} stuck items`);
              }
            }

            // ============================================================
            // Log summary
            // ============================================================
            core.info('=== Watchdog Summary ===');
            results.forEach(r => core.info(r));

            const summary = results.join('\n');
            core.setOutput('summary', summary);
            core.setOutput('issues_checked', issues.length.toString());
            core.setOutput('routing_failures', routingFailures.length.toString());
            core.setOutput('queue_stuck', queueStuck.length.toString());
            core.setOutput('issues_closed', results.filter(r => r.startsWith('🔴')).length.toString());
