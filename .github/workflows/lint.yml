name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: 代码检视 (Code Linting)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install pip conf
      run: |
        mkdir -p ~/.pip
        cp pip.conf ~/.pip/pip.conf || true
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint flake8 mypy
        # 安装项目依赖以便类型检查
        pip install -r requirements.txt
    
    - name: Static Code Analysis - Pylint
      run: |
        echo "=== Running Pylint (main.py only) ==="
        pylint --rcfile=.pylintrc main.py || echo "Pylint completed with warnings"

    - name: Static Code Analysis - Flake8
      run: |
        echo "=== Running Flake8 ==="
        flake8 .

    - name: Static Code Analysis - Mypy
      run: |
        echo "=== Running Mypy Type Checking (main.py only) ==="
        mypy main.py --config-file=mypy.ini || echo "Mypy completed with warnings"
