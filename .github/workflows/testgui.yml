name: Test GUI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  testgui:
    name: GUI截图测试 (GUI Screenshot Testing)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install pip conf
      run: |
        mkdir -p ~/.pip
        cp pip.conf ~/.pip/pip.conf || true
    
    - name: Install Chinese fonts for matplotlib
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei
        # Clear matplotlib font cache to recognize new fonts
        rm -rf ~/.cache/matplotlib
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium
    
    - name: Take Main GUI Screenshot
      run: |
        echo "=== Taking Main GUI Screenshot ==="
        python tests/guitests/screenshot_main.py main --output screenshots/main_gui.png
      continue-on-error: true
    
    - name: Take Strategy Config Screenshots
      run: |
        echo "=== Taking Strategy Configuration Screenshots ==="
        python tests/guitests/screenshot_main.py strategy --output-dir screenshots
      continue-on-error: true
    
    - name: Take History Feature Screenshots
      run: |
        echo "=== Taking History and Compare Feature Screenshots ==="
        python tests/guitests/screenshot_main.py history --output-dir screenshots
      continue-on-error: true
    
    - name: Take Stock Price Chart Screenshot
      run: |
        echo "=== Taking Stock Price Chart Screenshot ==="
        python tests/guitests/screenshot_main.py chart --output screenshots/stock_price_chart.png
      continue-on-error: true
    
    - name: Take Time Range Selection Screenshots
      run: |
        echo "=== Taking Time Range Selection Screenshots ==="
        python tests/guitests/screenshot_time_range.py --output-dir screenshots
      continue-on-error: true

    - name: Run GUI Workflow Screenshot Test
      run: |
        echo "=== Running GUI Workflow Screenshot Test ==="
        python -m unittest tests.guitests.test_gui_workflow_e2e -v
      continue-on-error: true
    
    - name: Run Stock Integration Test (Random Selection)
      run: |
        echo "=== Running Stock Integration Test (Random Selection from Pool) ==="
        python -m tests.test_yangtze_power
      continue-on-error: true
    
    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gui-screenshots
        path: screenshots/
        retention-days: 30
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gui-test-results
        path: test_results/
        retention-days: 30
    
    - name: Check Screenshot Status
      if: github.event_name == 'pull_request'
      id: commit_screenshots
      run: |
        # Check if screenshots were generated
        if ls screenshots/*.png 1> /dev/null 2>&1; then
          echo "Screenshots found"
          echo "has_screenshots=true" >> $GITHUB_OUTPUT
        else
          echo "No screenshots found"
          echo "has_screenshots=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Comment PR with Screenshots
      if: github.event_name == 'pull_request' && steps.commit_screenshots.outputs.has_screenshots == 'true'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          
          // 使用公开的 Images 仓库来托管图片
          // 这样图片可以通过 raw.githubusercontent.com 公开访问
          let mainGuiImage = '';
          let backtestResultImage = '';
          let strategyConfigImages = '';
          let historyImages = '';
          let workflowImages = '';
          
          const mainGuiPath = 'screenshots/main_gui.png';
          const backtestResultPath = 'screenshots/03_backtest_result_mean_cost.png';
          const strategyPaths = {
            'SMA策略配置': 'screenshots/strategy_sma_config.png',
            '均值成本策略配置': 'screenshots/strategy_mean_cost_config.png',
            '定投策略配置': 'screenshots/strategy_fixed_amount_config.png'
          };
          
          // 历史记录功能截图路径
          const historyScreenshots = [
            { path: 'screenshots/02_empty_history_page.png', title: '空历史记录页面' },
            { path: 'screenshots/04_history_with_one_record.png', title: '包含一条记录的历史页面' },
            { path: 'screenshots/06_history_records_selected.png', title: '选中记录准备对比' },
            { path: 'screenshots/07_compare_page_with_charts.png', title: '对比页面（表格+图表）' }
          ];
          
          const runId = context.runId;
          const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
          
          // 检查是否成功上传到公开仓库
          const uploaded = '${{ steps.upload_to_public_repo.outputs.uploaded }}' === 'true';
          const baseUrl = '${{ steps.upload_to_public_repo.outputs.base_url }}';
          
          console.log('Uploaded to public repo:', uploaded);
          console.log('Base URL:', baseUrl);
          
          // 处理主界面截图
          if (fs.existsSync(mainGuiPath)) {
            if (uploaded && baseUrl) {
              const imageUrl = `${baseUrl}/main_gui.png`;
              mainGuiImage = `![主界面截图](${imageUrl})`;
              console.log(`Main GUI image URL: ${imageUrl}`);
            } else {
              const stats = fs.statSync(mainGuiPath);
              mainGuiImage = `**主界面截图** (main_gui.png) - ${(stats.size / 1024).toFixed(1)} KB - [从 Artifacts 下载](${artifactUrl})`;
            }
          } else {
            mainGuiImage = '⚠️ 主界面截图未生成';
          }
          
          // 处理策略配置截图
          const strategyImages = [];
          for (const [title, path] of Object.entries(strategyPaths)) {
            if (fs.existsSync(path)) {
              if (uploaded && baseUrl) {
                const filename = path.split('/').pop();
                const imageUrl = `${baseUrl}/${filename}`;
                strategyImages.push(`#### ${title}\n\n![${title}](${imageUrl})`);
                console.log(`${title} URL: ${imageUrl}`);
              } else {
                const stats = fs.statSync(path);
                const filename = path.split('/').pop();
                strategyImages.push(`#### ${title}\n\n**${filename}** - ${(stats.size / 1024).toFixed(1)} KB - [从 Artifacts 下载](${artifactUrl})`);
              }
            }
          }
          
          if (strategyImages.length > 0) {
            strategyConfigImages = `\n### 🎯 策略参数配置界面\n\n${strategyImages.join('\n\n')}`;
          }

          // 处理完整工作流截图
          const workflowScreenshots = [
            { path: 'screenshots/workflow/01_open_home.png', title: '步骤1：打开界面' },
            { path: 'screenshots/workflow/02_select_strategy.png', title: '步骤2：选择股票后进入策略选择' },
            { path: 'screenshots/workflow/03_select_mode.png', title: '步骤3：选择策略进入运行模式' },
            { path: 'screenshots/workflow/04_select_time_range.png', title: '步骤4：选择回测模式进入时间段' },
            { path: 'screenshots/workflow/05_mean_cost_strategy.png', title: '步骤5：进入策略配置界面' },
            { path: 'screenshots/workflow/06_strategy_params.png', title: '步骤6：配置策略参数' },
            { path: 'screenshots/workflow/07_backtest_progress.png', title: '步骤7：回测进行中' },
            { path: 'screenshots/workflow/08_backtest_result.png', title: '步骤8：复盘结果' }
          ];

          const workflowImagesList = [];
          for (const screenshot of workflowScreenshots) {
            if (fs.existsSync(screenshot.path)) {
              if (uploaded && baseUrl) {
                const filename = screenshot.path.split('/').pop();
                const imageUrl = `${baseUrl}/${filename}`;
                workflowImagesList.push(`**${screenshot.title}**\n\n![${screenshot.title}](${imageUrl})`);
              } else {
                const stats = fs.statSync(screenshot.path);
                const filename = screenshot.path.split('/').pop();
                workflowImagesList.push(`**${screenshot.title}** (${filename}) - ${(stats.size / 1024).toFixed(1)} KB`);
              }
            }
          }

          if (workflowImagesList.length > 0) {
            workflowImages = `\n### 🧭 完整工作流截图\n\n${workflowImagesList.join('\n\n')}`;
          }
          
          // 处理回测结果UI截图
          if (fs.existsSync(backtestResultPath)) {
            if (uploaded && baseUrl) {
              const imageUrl = `${baseUrl}/03_backtest_result_mean_cost.png`;
              backtestResultImage = `![策略复盘界面截图](${imageUrl})`;
              console.log(`Backtest result UI screenshot URL: ${imageUrl}`);
            } else {
              const stats = fs.statSync(backtestResultPath);
              backtestResultImage = `**策略复盘界面截图** (03_backtest_result_mean_cost.png) - ${(stats.size / 1024).toFixed(1)} KB - [从 Artifacts 下载](${artifactUrl})`;
            }
          } else {
            backtestResultImage = '⚠️ 策略复盘界面截图未生成(可能是回测步骤失败或超时)';
            console.log('Warning: Backtest result screenshot not found at:', backtestResultPath);
          }
          
          // 处理历史记录功能截图
          let historyImagesList = [];
          for (const screenshot of historyScreenshots) {
            if (fs.existsSync(screenshot.path)) {
              if (uploaded && baseUrl) {
                const filename = screenshot.path.split('/').pop();
                const imageUrl = `${baseUrl}/${filename}`;
                historyImagesList.push(`**${screenshot.title}**\n\n![${screenshot.title}](${imageUrl})`);
                console.log(`History screenshot URL: ${imageUrl}`);
              } else {
                const stats = fs.statSync(screenshot.path);
                const filename = screenshot.path.split('/').pop();
                historyImagesList.push(`**${screenshot.title}** (${filename}) - ${(stats.size / 1024).toFixed(1)} KB`);
              }
            }
          }
          
          if (historyImagesList.length > 0) {
            historyImages = `
          ### 📋 历史记录功能截图
          
          ${historyImagesList.join('\n\n')}
          `;
          }
          
           // 读取测试结果
          let testResult = '';
          try {
            const resultPath = 'test_results/yangtze_power_test.json';
            if (fs.existsSync(resultPath)) {
              const data = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
              const totalProfit = (data.total_value || data.init_cash || 0) - (data.init_cash || 0);
              const returnRate = (data.init_cash > 0) ? (totalProfit / data.init_cash * 100) : 0;
              testResult = `
          ### 📊 策略复盘界面
          
          **测试数据摘要**:
          - **股票代码**: ${data.symbol || '未知'}
          - **测试期间**: ${data.start_date || '2020-01-01'} ~ ${data.end_date || '2022-12-31'}
          - **初始资金**: ¥${(data.init_cash || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **最大占用资金**: ¥${(data.max_capital_used || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **最终资金**: ¥${(data.cash || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **持有市值**: ¥${(data.market_value || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **总资产**: ¥${(data.total_value || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **总收益**: ¥${totalProfit.toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **收益率**: ${returnRate.toFixed(2)}%
          - **交易次数**: ${data.trades || 0}
          - **持有股数**: ${data.shares || 0}
          
          **真实UI界面截图**:
          
          ${backtestResultImage}
          `;
            }
          } catch (e) {
            console.log('Failed to read test results:', e);
          }
          
          const comment = `
          ## 🖼️ GUI截图测试报告
          
          ### 📊 主界面截图
          
          ${mainGuiImage}
          ${strategyConfigImages}
          ${workflowImages}
          
          ${historyImages}
          
          ${testResult}
          
          ### 📁 完整报告
          
          所有截图和详细测试结果可在 [GitHub Actions Artifacts](${artifactUrl}) 中下载：
          - **gui-screenshots**: 包含主界面截图、策略配置截图和测试结果图表
          - **gui-test-results**: 包含测试结果JSON数据
          
          ---
          *Generated by Test GUI Workflow*
          `;
          
          console.log('Attempting to create PR comment...');
          console.log('Issue number:', context.issue.number);
          console.log('Owner:', context.repo.owner);
          console.log('Repo:', context.repo.repo);
          
          try {
            const response = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            console.log('Comment created successfully:', response.data.html_url);
          } catch (error) {
            console.error('Failed to create comment:', error);
            throw error;
          }
