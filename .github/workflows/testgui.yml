name: Test GUI

on:
  push:
    branches: [ main, 'feat/*', 'fix/*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  testgui:
    name: GUI截图测试
    runs-on: ubuntu-latest
    env:
      PORT: '5001'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip conf
        run: |
          mkdir -p ~/.pip
          cp pip.conf ~/.pip/pip.conf || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run GUI backtest report test
        run: |
          timeout 300 python -m unittest tests.guitests.test_gui_backtest_report_e2e -v

      - name: Run supporting GUI regressions
        run: |
          python -m unittest \
            tests.guitests.test_gui_app \
            tests.guitests.test_realtime_lot_calculation \
            tests.unit.test_guitest_workflow_report -v

      - name: Verify testing outputs
        run: |
          test -f testing/guitest.md
          test $(find testing -maxdepth 1 -name '*.png' | wc -l) -eq 8
          ls -la testing/

      - name: Upload GUI testing artifacts
        id: upload_testing_artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guitest-report
          path: testing/
          retention-days: 30

      - name: Publish GUI screenshots to branch
        # Skip on PR events — GITHUB_TOKEN lacks push permission for guitest-assets branch
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: guitest-assets
          destination_dir: runs/${{ github.run_id }}
          publish_dir: testing
          keep_files: true

      - name: Comment PR with GUI report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          GUITEST_IMAGE_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/guitest-assets/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { commentGuitestReport } = require(
              process.env.GITHUB_WORKSPACE + '/.github/scripts/comment_guitest_report.js'
            );
            await commentGuitestReport({
              github,
              context,
              core,
              artifactName: 'guitest-report',
              imageBaseUrl: process.env.GUITEST_IMAGE_BASE_URL,
            });

      - name: Final workflow status
        if: always()
        run: |
          echo "=== Final GUI Workflow Status ==="
          echo "testing 目录内容："
          ls -la testing/ || true
