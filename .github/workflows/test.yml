name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: 自动化测试 (Automated Testing)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install pip conf
      run: |
        mkdir -p ~/.pip
        cp pip.conf ~/.pip/pip.conf || true
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run all tests
      id: run_tests
      run: |
        echo "=== Running All Tests ==="
        python -m unittest discover tests -v 2>&1 | tee test_output.log
        echo "test_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      continue-on-error: true
    
    - name: Run strategy simulator tests
      id: run_simulator_tests
      run: |
        echo "=== Testing Trading Strategy Simulators ==="
        python -m unittest tests.test_simulator -v 2>&1 | tee -a test_output.log
        echo "simulator_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      continue-on-error: true
    
    - name: Verify simulator functionality
      id: verify_simulator
      run: |
        echo "=== Verifying Mean Cost Strategy ==="
        python -c "from simulator.simulator import Simulator; from solver.mean_cost_strategy import MeanCostDecision; print('✓ Mean Cost Strategy loaded successfully')" 2>&1 | tee -a test_output.log
        echo "=== Verifying SMA Strategy ==="
        python -c "from simulator.simulator import Simulator, simulate_sma; from solver.sma_strategy import SmaDecision; print('✓ SMA Strategy loaded successfully')" 2>&1 | tee -a test_output.log
        echo "verify_exit_code=$?" >> $GITHUB_OUTPUT
      continue-on-error: true
    
    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: test_output.log
        retention-days: 30
    
    - name: Comment PR with Test Results
      if: github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          
          const runId = context.runId;
          const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
          
          // 读取测试日志
          let testLog = '';
          try {
            if (fs.existsSync('test_output.log')) {
              testLog = fs.readFileSync('test_output.log', 'utf8');
              // 限制日志长度，GitHub评论有65536字符限制
              if (testLog.length > 50000) {
                testLog = testLog.substring(testLog.length - 50000);
                testLog = '...(日志过长，仅显示最后50000字符)\n\n' + testLog;
              }
            } else {
              testLog = '未找到测试日志文件';
            }
          } catch (e) {
            console.log('Failed to read test log:', e);
            testLog = '读取测试日志失败: ' + e.message;
          }
          
          // 获取测试结果状态
          const testExitCode = '${{ steps.run_tests.outputs.test_exit_code }}';
          const simulatorExitCode = '${{ steps.run_simulator_tests.outputs.simulator_exit_code }}';
          const verifyExitCode = '${{ steps.verify_simulator.outputs.verify_exit_code }}';
          
          const allTestsPassed = testExitCode === '0';
          const simulatorTestsPassed = simulatorExitCode === '0';
          const verifyPassed = verifyExitCode === '0';
          
          const overallStatus = allTestsPassed && simulatorTestsPassed && verifyPassed ? '✅ 通过' : '❌ 失败';
          
          const comment = `
          ## 🧪 自动化测试报告
          
          ### 📊 测试结果总览
          
          | 测试类型 | 状态 | 退出代码 |
          |---------|------|----------|
          | 全部单元测试 | ${allTestsPassed ? '✅ 通过' : '❌ 失败'} | ${testExitCode} |
          | 策略模拟器测试 | ${simulatorTestsPassed ? '✅ 通过' : '❌ 失败'} | ${simulatorExitCode} |
          | 模拟器功能验证 | ${verifyPassed ? '✅ 通过' : '❌ 失败'} | ${verifyExitCode} |
          | **总体状态** | **${overallStatus}** | - |
          
          ### 📝 测试日志
          
          <details>
          <summary>点击展开查看完整测试日志</summary>
          
          \`\`\`
          ${testLog}
          \`\`\`
          
          </details>
          
          ### 📁 完整日志
          
          完整测试日志可在 [GitHub Actions Artifacts](${artifactUrl}) 中下载：
          - **test-logs**: 包含所有测试的完整输出日志
          
          ---
          *Generated by Test Workflow*
          `;
          
          console.log('Attempting to create PR comment...');
          console.log('Issue number:', context.issue.number);
          console.log('Owner:', context.repo.owner);
          console.log('Repo:', context.repo.repo);
          
          try {
            const response = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            console.log('Comment created successfully:', response.data.html_url);
          } catch (error) {
            console.error('Failed to create comment:', error);
            throw error;
          }
