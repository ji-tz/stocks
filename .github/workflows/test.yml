name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: 自动化测试 (Automated Testing)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install pip conf
      run: |
        mkdir -p ~/.pip
        cp pip.conf ~/.pip/pip.conf || true
    
    - name: Install Chinese fonts for matplotlib
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei
        # Clear matplotlib font cache to recognize new fonts
        rm -rf ~/.cache/matplotlib
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium
    
    - name: Run all tests
      run: |
        echo "=== Running All Tests ==="
        python -m unittest discover tests -v
    
    - name: Run strategy simulator tests
      run: |
        echo "=== Testing Trading Strategy Simulators ==="
        python -m unittest tests.test_simulator -v
    
    - name: Verify simulator functionality
      run: |
        echo "=== Verifying Mean Cost Strategy ==="
        python -c "from simulator.simulator import Simulator; from solver.mean_cost_strategy import MeanCostDecision; print('✓ Mean Cost Strategy loaded successfully')"
        echo "=== Verifying SMA Strategy ==="
        python -c "from simulator.simulator import Simulator, simulate_sma; from solver.sma_strategy import SmaDecision; print('✓ SMA Strategy loaded successfully')"
    
    - name: Take Main GUI Screenshot
      run: |
        echo "=== Taking Main GUI Screenshot ==="
        python screenshot_main.py screenshots/main_gui.png
      continue-on-error: true
    
    - name: Take Strategy Config Screenshots
      run: |
        echo "=== Taking Strategy Config Screenshots ==="
        python screenshot_strategy_config.py screenshots/
      continue-on-error: true
    
    - name: Take History Screenshots
      run: |
        echo "=== Taking History Screenshots ==="
        python screenshot_history.py screenshots/
    - name: Take History Feature Screenshots
      run: |
        echo "=== Taking History and Compare Feature Screenshots ==="
        python screenshot_history.py screenshots
      continue-on-error: true
    
    - name: Run Stock Integration Test (Random Selection)
      run: |
        echo "=== Running Stock Integration Test (Random Selection from Pool) ==="
        python test_yangtze_power.py
      continue-on-error: true
    
    - name: Test Stock Price Chart Feature
      run: |
        echo "=== Testing Stock Price Volatility Line Feature ==="
        python -m unittest tests.test_gui_app.TestGuiRoutes.test_result_page_contains_stock_price_chart -v
      continue-on-error: true
    
    - name: Take Stock Price Chart Screenshot
      run: |
        echo "=== Taking Stock Price Chart Screenshot ==="
        python screenshot_stock_price_chart.py screenshots/stock_price_chart.png
      continue-on-error: true
    
    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: screenshots/
        retention-days: 30
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test_results/
        retention-days: 30
    
    - name: Check Screenshot Status
      if: github.event_name == 'pull_request'
      id: commit_screenshots
      run: |
        # Check if screenshots were generated
        if ls screenshots/*.png 1> /dev/null 2>&1; then
          echo "Screenshots found"
          echo "has_screenshots=true" >> $GITHUB_OUTPUT
        else
          echo "No screenshots found"
          echo "has_screenshots=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload Screenshots to Public Images Repository
      if: github.event_name == 'pull_request' && steps.commit_screenshots.outputs.has_screenshots == 'true'
      id: upload_to_public_repo
      env:
        IMAGES_TOKEN: ${{ secrets.IMAGES_REPO_TOKEN }}
      run: |
        # Clone the public Images repository
        cd /tmp
        
        # Use authenticated clone if token is available
        if [ -n "$IMAGES_TOKEN" ]; then
          echo "Using authenticated clone with IMAGES_REPO_TOKEN"
          git clone https://$IMAGES_TOKEN@github.com/183965983/Images.git
        else
          echo "No IMAGES_REPO_TOKEN found, using unauthenticated clone"
          echo "⚠️ Push will likely fail without authentication"
          git clone https://github.com/183965983/Images.git
        fi
        
        cd Images
        
        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Create a directory for this PR's screenshots
        SCREENSHOT_DIR="stocks/pr-${{ github.event.pull_request.number }}/run-${{ github.run_number }}"
        mkdir -p "$SCREENSHOT_DIR"
        
        # Check if screenshots exist before copying
        if ls $GITHUB_WORKSPACE/screenshots/*.png 1> /dev/null 2>&1; then
          # Copy screenshots
          cp $GITHUB_WORKSPACE/screenshots/*.png "$SCREENSHOT_DIR/"
          echo "Screenshots copied successfully"
        else
          echo "No PNG files found in screenshots directory"
          echo "uploaded=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # Add and commit
        git add "$SCREENSHOT_DIR"
        
        if git diff --cached --quiet; then
          echo "No new screenshots to upload (already exist)"
          # Still set outputs so reruns can use existing public URLs
          echo "uploaded=true" >> $GITHUB_OUTPUT
          echo "base_url=https://raw.githubusercontent.com/183965983/Images/main/$SCREENSHOT_DIR" >> $GITHUB_OUTPUT
        else
          git commit -m "Add screenshots for stocks PR #${{ github.event.pull_request.number }} run ${{ github.run_number }}"
          
          # Push to the public repository
          if [ -n "$IMAGES_TOKEN" ]; then
            echo "Pushing with authentication..."
            if git push https://$IMAGES_TOKEN@github.com/183965983/Images.git main; then
              echo "✅ Screenshots uploaded successfully"
              echo "uploaded=true" >> $GITHUB_OUTPUT
              echo "base_url=https://raw.githubusercontent.com/183965983/Images/main/$SCREENSHOT_DIR" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to push screenshots even with authentication"
              echo "uploaded=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Trying unauthenticated push..."
            if git push origin main; then
              echo "✅ Screenshots uploaded successfully"
              echo "uploaded=true" >> $GITHUB_OUTPUT
              echo "base_url=https://raw.githubusercontent.com/183965983/Images/main/$SCREENSHOT_DIR" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to push screenshots - authentication required"
              echo "Please add IMAGES_REPO_TOKEN to repository secrets"
              echo "⚠️ Recommended: Use a fine-grained PAT with 'contents: read/write' permission scoped only to the 183965983/Images repository"
              echo "See: https://github.com/settings/tokens?type=beta (fine-grained) or https://github.com/settings/tokens (classic with repo scope)"
              echo "Add at: https://github.com/183965983/stocks/settings/secrets/actions"
              echo "uploaded=false" >> $GITHUB_OUTPUT
            fi
          fi
        fi
    
    - name: Comment PR with Test Results and Screenshots
      if: github.event_name == 'pull_request' && steps.commit_screenshots.outputs.has_screenshots == 'true'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          
          // 使用公开的 Images 仓库来托管图片
          // 这样图片可以通过 raw.githubusercontent.com 公开访问
          let mainGuiImage = '';
          let yangtzeImage = '';
          let stockPriceChartImage = '';
          let strategyConfigImages = '';
          let historyImages = '';
          
          const mainGuiPath = 'screenshots/main_gui.png';
          const yangtzeImagePath = 'screenshots/yangtze_power_test.png';
          const stockPriceChartPath = 'screenshots/stock_price_chart.png';
          
          // 策略配置截图路径
          const strategyPaths = {
            sma: 'screenshots/strategy_sma_config.png',
            meanCost: 'screenshots/strategy_mean_cost_config.png',
            fixedAmount: 'screenshots/strategy_fixed_amount_config.png'
          };
          
          // 历史记录截图路径
          const historyPaths = [
            'screenshots/history_empty.png',
            'screenshots/history_one_record.png',
            'screenshots/history_selected.png',
            'screenshots/compare_page.png'
          ];
          
          // 历史记录功能截图路径
          const historyScreenshots = [
            { path: 'screenshots/02_empty_history_page.png', title: '空历史记录页面' },
            { path: 'screenshots/04_history_with_one_record.png', title: '包含一条记录的历史页面' },
            { path: 'screenshots/06_history_records_selected.png', title: '选中记录准备对比' },
            { path: 'screenshots/07_compare_page_with_charts.png', title: '对比页面（表格+图表）' }
          ];
          
          const runId = context.runId;
          const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
          
          // 检查是否成功上传到公开仓库
          const uploaded = '${{ steps.upload_to_public_repo.outputs.uploaded }}' === 'true';
          const baseUrl = '${{ steps.upload_to_public_repo.outputs.base_url }}';
          
          console.log('Uploaded to public repo:', uploaded);
          console.log('Base URL:', baseUrl);
          
          // 处理主界面截图
          if (fs.existsSync(mainGuiPath)) {
            if (uploaded && baseUrl) {
              const imageUrl = `${baseUrl}/main_gui.png`;
              mainGuiImage = `![主界面截图](${imageUrl})`;
              console.log(`Main GUI image URL: ${imageUrl}`);
            } else {
              const stats = fs.statSync(mainGuiPath);
              mainGuiImage = `**主界面截图** (main_gui.png) - ${(stats.size / 1024).toFixed(1)} KB - [从 Artifacts 下载](${artifactUrl})`;
            }
          } else {
            mainGuiImage = '⚠️ 主界面截图未生成';
          }
          
          // 处理测试结果图表
          if (fs.existsSync(yangtzeImagePath)) {
            if (uploaded && baseUrl) {
              const imageUrl = `${baseUrl}/yangtze_power_test.png`;
              yangtzeImage = `![股票测试结果图表](${imageUrl})`;
              console.log(`Yangtze chart URL: ${imageUrl}`);
            } else {
              const stats = fs.statSync(yangtzeImagePath);
              yangtzeImage = `**测试结果图表** (yangtze_power_test.png) - ${(stats.size / 1024).toFixed(1)} KB - [从 Artifacts 下载](${artifactUrl})`;
            }
          } else {
            yangtzeImage = ''; // 测试结果图表是可选的，不显示警告
          }
          
          // 处理股价波动线图表截图
          if (fs.existsSync(stockPriceChartPath)) {
            if (uploaded && baseUrl) {
              const imageUrl = `${baseUrl}/stock_price_chart.png`;
              stockPriceChartImage = `![股价波动线图表](${imageUrl})`;
              console.log(`Stock price chart URL: ${imageUrl}`);
            } else {
              const stats = fs.statSync(stockPriceChartPath);
              stockPriceChartImage = `**股价波动线图表** (stock_price_chart.png) - ${(stats.size / 1024).toFixed(1)} KB - [从 Artifacts 下载](${artifactUrl})`;
            }
          } else {
            stockPriceChartImage = ''; // 股价图表是可选的，不显示警告
          }
          
          // 处理策略配置截图
          let strategyCount = 0;
          for (const [name, path] of Object.entries(strategyPaths)) {
            if (fs.existsSync(path)) {
              strategyCount++;
              if (uploaded && baseUrl) {
                const filename = path.split('/').pop();
                const imageUrl = `${baseUrl}/${filename}`;
                strategyConfigImages += `![${name}策略配置](${imageUrl})\n\n`;
              }
            }
          }
          if (strategyCount === 0) {
            strategyConfigImages = ''; // 策略配置截图是可选的
          }
          
          // 处理历史记录截图
          let historyCount = 0;
          for (const path of historyPaths) {
            if (fs.existsSync(path)) {
              historyCount++;
              if (uploaded && baseUrl) {
                const filename = path.split('/').pop();
                const imageUrl = `${baseUrl}/${filename}`;
                const title = filename.replace('.png', '').replace(/_/g, ' ');
                historyImages += `![${title}](${imageUrl})\n\n`;
              }
            }
          }
          if (historyCount === 0) {
            historyImages = ''; // 历史记录截图是可选的
          // 处理历史记录功能截图
          let historyImagesList = [];
          for (const screenshot of historyScreenshots) {
            if (fs.existsSync(screenshot.path)) {
              if (uploaded && baseUrl) {
                const filename = screenshot.path.split('/').pop();
                const imageUrl = `${baseUrl}/${filename}`;
                historyImagesList.push(`**${screenshot.title}**\n\n![${screenshot.title}](${imageUrl})`);
                console.log(`History screenshot URL: ${imageUrl}`);
              } else {
                const stats = fs.statSync(screenshot.path);
                const filename = screenshot.path.split('/').pop();
                historyImagesList.push(`**${screenshot.title}** (${filename}) - ${(stats.size / 1024).toFixed(1)} KB`);
              }
            }
          }
          
          if (historyImagesList.length > 0) {
            historyImages = `
          ### 📋 历史记录功能截图
          
          ${historyImagesList.join('\n\n')}
          `;
          }
          
           // 读取测试结果
          let testResult = '';
          try {
            const resultPath = 'test_results/yangtze_power_test.json';
            if (fs.existsSync(resultPath)) {
              const data = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
              const totalProfit = (data.total_value || data.init_cash || 0) - (data.init_cash || 0);
              const returnRate = (data.init_cash > 0) ? (totalProfit / data.init_cash * 100) : 0;
              testResult = `
          ### 📊 策略复盘
          
          - **股票代码**: ${data.symbol || '未知'}
          - **测试期间**: ${data.start_date || '2020-01-01'} ~ ${data.end_date || '2022-12-31'}
          - **初始资金**: ¥${(data.init_cash || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **最大占用资金**: ¥${(data.max_capital_used || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **最终资金**: ¥${(data.cash || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **持有市值**: ¥${(data.market_value || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **总资产**: ¥${(data.total_value || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **总收益**: ¥${totalProfit.toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **收益率**: ${returnRate.toFixed(2)}%
          - **交易次数**: ${data.trades || 0}
          - **持有股数**: ${data.shares || 0}
          
          ${yangtzeImage}
          `;
            }
          } catch (e) {
            console.log('Failed to read test results:', e);
          }
          
          const comment = `
          ## 🧪 自动化测试报告
          
          ### 📊 主界面截图
          
          ${mainGuiImage}
          
          ${strategyConfigImages ? '### 🎯 策略参数配置界面\n\n' + strategyConfigImages : ''}
          
          ${historyImages ? '### 📚 历史记录与对比功能\n\n' + historyImages : ''}
          
          ${testResult}
          
          ### 📈 股价波动线功能测试
          
          **功能说明**: 复盘界面新增股价波动线，使用双Y轴同步显示总资产和股价变化
          
          ${stockPriceChartImage ? stockPriceChartImage : '⚠️ 股价波动线图表截图未生成'}
          
          **测试内容**:
          - ✅ 验证图表包含 \`stockPriceData\` 和 \`totalValueData\` 数据集
          - ✅ 验证双Y轴配置（左轴：总资产，右轴：股价）
          - ✅ 验证图表标签和Y轴标题
          - ✅ 自动化截图验证图表渲染
          ${historyImages}
          
          ### 📁 完整报告
          
          所有截图和详细测试结果可在 [GitHub Actions Artifacts](${artifactUrl}) 中下载：
          - **test-screenshots**: 包含主界面截图和测试结果图表
          - **test-results**: 包含测试结果JSON数据
          
          ---
          *Generated by Test Workflow*
          `;
          
          console.log('Attempting to create PR comment...');
          console.log('Issue number:', context.issue.number);
          console.log('Owner:', context.repo.owner);
          console.log('Repo:', context.repo.repo);
          
          try {
            const response = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            console.log('Comment created successfully:', response.data.html_url);
          } catch (error) {
            console.error('Failed to create comment:', error);
            throw error;
          }
