name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: 自动化测试 (Automated Testing)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install pip conf
      run: |
        mkdir -p ~/.pip
        cp pip.conf ~/.pip/pip.conf || true
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium
    
    - name: Run all tests
      run: |
        echo "=== Running All Tests ==="
        python -m unittest discover tests -v
    
    - name: Run strategy simulator tests
      run: |
        echo "=== Testing Trading Strategy Simulators ==="
        python -m unittest tests.test_simulator -v
    
    - name: Verify simulator functionality
      run: |
        echo "=== Verifying Mean Cost Strategy ==="
        python -c "from simulator.simulator import Simulator; from solver.mean_cost_strategy import MeanCostDecision; print('✓ Mean Cost Strategy loaded successfully')"
        echo "=== Verifying SMA Strategy ==="
        python -c "from simulator.simulator import Simulator, simulate_sma; from solver.sma_strategy import SmaDecision; print('✓ SMA Strategy loaded successfully')"
    
    - name: Take Main GUI Screenshot
      run: |
        echo "=== Taking Main GUI Screenshot ==="
        python screenshot_main.py screenshots/main_gui.png
      continue-on-error: true
    
    - name: Run Yangtze Power Integration Test
      run: |
        echo "=== Running Yangtze Power (600900) Integration Test ==="
        python test_yangtze_power.py
      continue-on-error: true
    
    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: screenshots/
        retention-days: 30
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test_results/
        retention-days: 30
    
    - name: Commit Screenshots to PR Branch
      if: github.event_name == 'pull_request'
      id: commit_screenshots
      continue-on-error: true
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add screenshots if they exist
        HAS_CHANGES=false
        if [ -f "screenshots/main_gui.png" ]; then
          git add -f screenshots/main_gui.png
          HAS_CHANGES=true
        fi
        if [ -f "screenshots/yangtze_power_test.png" ]; then
          git add -f screenshots/yangtze_power_test.png
          HAS_CHANGES=true
        fi
        
        # Commit and push to current PR branch
        if [ "$HAS_CHANGES" = true ]; then
          # Check if there are actual changes to commit
          if git diff --cached --quiet; then
            echo "Files already committed, skipping commit"
            echo "has_screenshots=true" >> $GITHUB_OUTPUT
          else
            # Attempt to commit
            if git commit -m "Add test screenshots from CI run ${{ github.run_number }} [skip ci]"; then
              echo "Commit successful"
              # Push using the head ref to handle detached HEAD state
              if git push origin HEAD:${{ github.head_ref }}; then
                echo "Push successful"
                echo "has_screenshots=true" >> $GITHUB_OUTPUT
                echo "Waiting for GitHub to process commit..."
                sleep 10
              else
                echo "⚠️ Warning: Push failed, screenshots not committed to PR branch"
                echo "Screenshots will still be available in artifacts"
                echo "has_screenshots=true" >> $GITHUB_OUTPUT
              fi
            else
              echo "⚠️ Warning: Commit failed"
              echo "has_screenshots=true" >> $GITHUB_OUTPUT
            fi
          fi
        else
          echo "No screenshots to commit"
          echo "has_screenshots=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Debug - Check screenshots and outputs
      if: github.event_name == 'pull_request'
      run: |
        echo "=== Debugging Screenshot Status ==="
        echo "Event name: ${{ github.event_name }}"
        echo "Has screenshots output: ${{ steps.commit_screenshots.outputs.has_screenshots }}"
        echo "Files in screenshots directory:"
        ls -la screenshots/ || echo "No screenshots directory"
        echo "Git status:"
        git status
    
    - name: Comment PR with Test Results and Screenshots
      if: github.event_name == 'pull_request' && steps.commit_screenshots.outputs.has_screenshots == 'true'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // 使用 base64 编码将图片直接嵌入到评论中
          // 这样即使是私有仓库，图片也能直接显示
          let mainGuiImage = '';
          let yangtzeImage = '';
          
          const mainGuiPath = 'screenshots/main_gui.png';
          const yangtzeImagePath = 'screenshots/yangtze_power_test.png';
          
          const runId = context.runId;
          const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
          
          // 处理主界面截图
          if (fs.existsSync(mainGuiPath)) {
            try {
              console.log('Encoding main GUI screenshot as base64...');
              const imageData = fs.readFileSync(mainGuiPath);
              const base64Image = imageData.toString('base64');
              mainGuiImage = `![主界面截图](data:image/png;base64,${base64Image})`;
              console.log('Main GUI screenshot encoded, original size:', (imageData.length / 1024).toFixed(1), 'KB');
            } catch (e) {
              console.log('Failed to encode main GUI image:', e.message);
              const stats = fs.statSync(mainGuiPath);
              mainGuiImage = `**主界面截图** (main_gui.png) - ${(stats.size / 1024).toFixed(1)} KB - [从 Artifacts 下载](${artifactUrl})`;
            }
          } else {
            mainGuiImage = '⚠️ 主界面截图未生成';
          }
          
          // 处理测试结果图表
          if (fs.existsSync(yangtzeImagePath)) {
            try {
              console.log('Encoding Yangtze Power test chart as base64...');
              const imageData = fs.readFileSync(yangtzeImagePath);
              const base64Image = imageData.toString('base64');
              yangtzeImage = `![长江电力测试结果图表](data:image/png;base64,${base64Image})`;
              console.log('Yangtze chart encoded, original size:', (imageData.length / 1024).toFixed(1), 'KB');
            } catch (e) {
              console.log('Failed to encode Yangtze chart:', e.message);
              const stats = fs.statSync(yangtzeImagePath);
              yangtzeImage = `**测试结果图表** (yangtze_power_test.png) - ${(stats.size / 1024).toFixed(1)} KB - [从 Artifacts 下载](${artifactUrl})`;
            }
          } else {
            yangtzeImage = ''; // 测试结果图表是可选的，不显示警告
          }
          
           // 读取测试结果
          let testResult = '';
          try {
            const resultPath = 'test_results/yangtze_power_test.json';
            if (fs.existsSync(resultPath)) {
              const data = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
              const totalProfit = (data.total_value || data.init_cash || 0) - (data.init_cash || 0);
              const returnRate = (data.init_cash > 0) ? (totalProfit / data.init_cash * 100) : 0;
              testResult = `
          ### 📈 长江电力（600900）2020-2022定投测试结果
          
          - **股票代码**: ${data.symbol || '600900'}
          - **测试期间**: ${data.start_date || '2020-01-01'} ~ ${data.end_date || '2022-12-31'}
          - **初始资金**: ¥${(data.init_cash || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **最终资金**: ¥${(data.cash || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **持有市值**: ¥${(data.market_value || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **总资产**: ¥${(data.total_value || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **总收益**: ¥${totalProfit.toLocaleString('zh-CN', {minimumFractionDigits: 2})}
          - **收益率**: ${returnRate.toFixed(2)}%
          - **交易次数**: ${data.trades || 0}
          - **持有股数**: ${data.shares || 0}
          
          ${yangtzeImage}
          `;
            }
          } catch (e) {
            console.log('Failed to read test results:', e);
          }
          
          const comment = `
          ## 🧪 自动化测试报告
          
          ### 📊 主界面截图
          
          ${mainGuiImage}
          
          ${testResult}
          
          ### 📁 完整报告
          
          所有截图和详细测试结果可在 [GitHub Actions Artifacts](${artifactUrl}) 中下载：
          - **test-screenshots**: 包含主界面截图和测试结果图表
          - **test-results**: 包含测试结果JSON数据
          
          ---
          *Generated by Test Workflow*
          `;
          
          console.log('Attempting to create PR comment...');
          console.log('Issue number:', context.issue.number);
          console.log('Owner:', context.repo.owner);
          console.log('Repo:', context.repo.repo);
          
          try {
            const response = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            console.log('Comment created successfully:', response.data.html_url);
          } catch (error) {
            console.error('Failed to create comment:', error);
            throw error;
          }
